<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treino 30 Minutos - Elite</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div id="selection-screen">
        <h1>Escolha sua Ficha</h1>
        <div id="menu-dynamic-btns" class="menu-btns">
          <p>Carregando treinos...</p>
        </div>
      </div>

      <div id="list-screen">
        <div class="ficha-header">
          <span id="list-icone" class="ficha-icone"></span>
          <h1 id="list-title">Ficha</h1>
        </div>

        <p id="list-descricao" class="ficha-descricao"></p>

        <div class="ficha-stats" id="ficha-stats">
          <div class="stat-card">
            <span class="stat-value" id="stat-exercicios">—</span>
            <span class="stat-label">Exercícios</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-voltas">—</span>
            <span class="stat-label">Voltas</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-atividade">—</span>
            <span class="stat-label">Atividade</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-descanso">—</span>
            <span class="stat-label">Descanso</span>
          </div>
        </div>

        <div class="ficha-nivel-row">
          <span class="ficha-tipo-badge" id="ficha-tipo-badge"></span>
          <span class="ficha-nivel-badge" id="ficha-nivel-badge"></span>
        </div>

        <ul id="exercise-ul" class="exercise-list"></ul>

        <button class="btn-start" onclick="startCountdown()">
          ▶ INICIAR TREINO
        </button>
        <button class="btn-back" onclick="goBack()">← Voltar</button>
      </div>

      <div id="timer-screen">
        <h2
          id="current-ficha-header"
          style="margin: 0; color: #7f8c8d; font-size: 1rem"
        >
          ---
        </h2>
        <div class="exercise-name" id="exercise-display">Preparar...</div>

        <div class="timer-circle" id="timer-visual">
          <div id="status-label">READY</div>
          <div id="time-left">5</div>
        </div>

        <div class="progress-bar-track">
          <div id="progress-bar-fill"></div>
        </div>

        <div class="info-bar">
          <div>VOLTA: <span id="current-session">1</span>/2</div>
          <div>
            EX: <span id="current-ex-num">1</span>/<span id="total-ex-num">8</span>
          </div>
        </div>

        <div class="timer-actions">
          <button id="btn-pause" class="btn-pause" onclick="togglePause()">Pausar</button>
          <button class="btn-repeat" onclick="repeatWorkout()">Repetir</button>
          <button class="btn-cancel" onclick="cancelWorkout()">Cancelar</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
